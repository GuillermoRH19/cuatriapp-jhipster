<div class="login-auth-layout">
  
  <div class="login-hero-side">
    <div class="hero-overlay"></div>
    <div class="hero-content-float">
      <h1 class="hero-app-name">CuatriApp</h1>
      <p class="hero-tagline">Gestión empresarial inteligente, segura y moderna.</p>
      
      <div class="hero-features">
        <div class="feature-item">
          <fa-icon icon="check-circle"></fa-icon>
          <span>Control total de perfiles y permisos</span>
        </div>
        <div class="feature-item">
          <fa-icon icon="check-circle"></fa-icon>
          <span>Administración centralizada de usuarios</span>
        </div>
        <div class="feature-item">
          <fa-icon icon="check-circle"></fa-icon>
          <span>Módulos dinámicos y reportes</span>
        </div>
      </div>
    </div>
  </div>

  <div class="login-form-side">
    <div class="login-container-premium">
      
      <!-- Card de Inicia Sesión -->
      <div class="premium-card mb-4">
        <div class="text-center mb-4">
          <div class="login-icon-box mx-auto mb-3">
             <fa-icon icon="lock"></fa-icon>
          </div>
          <h2 class="login-title">Iniciar Sesión</h2>
          <p class="login-subtitle">Ingresa tus credenciales para continuar</p>
        </div>
        
        @if (authenticationError) {
          <div class="error-alert">
            <fa-icon icon="exclamation-triangle" class="me-2"></fa-icon>
            <span>Usuario o contraseña incorrectos.</span>
          </div>
        }

        <form (ngSubmit)="login()" [formGroup]="loginForm">
          <div class="mb-3">
            <label class="form-label" for="username">Usuario</label>
            <div class="premium-input-wrapper">
              <fa-icon icon="user" class="input-icon"></fa-icon>
              <input type="text" class="form-control" id="username" formControlName="username" placeholder="Tu usuario" #username>
            </div>
          </div>

          <div class="mb-4">
            <label class="form-label" for="password">Contraseña</label>
            <div class="premium-input-wrapper">
              <fa-icon icon="key" class="input-icon"></fa-icon>
              <input type="password" class="form-control" id="password" formControlName="password" placeholder="••••••••">
            </div>
          </div>

          <div class="mb-4 d-flex justify-content-between align-items-center">
            <div class="form-check">
              <input type="checkbox" class="form-check-input" id="rememberMe" formControlName="rememberMe">
              <label class="form-check-label ms-2 small text-slate-600" for="rememberMe">Recordarme</label>
            </div>
          </div>

          <button type="submit" class="btn btn-primary-premium w-100" [disabled]="loginForm.invalid || isLoadingFetch">
            @if (isLoadingFetch) {
              <span class="spinner-border spinner-border-sm me-2"></span>
              <span>Autenticando...</span>
            } @else {
              <span>Entrar al Sistema</span>
            }
          </button>
        </form>
      </div>

      <!-- Card de Postulación (Candidatos) -->
      <div class="premium-card registration-card">
        <jhi-registro-publico></jhi-registro-publico>
      </div>

    </div>
  </div>
</div>
