<div class="container mt-5">
  <div class="row align-items-start">
    
    <div class="col-md-5 mb-4">
      <div class="card shadow-sm">
        <div class="card-body">
          <h2 class="card-title text-center mb-4">Iniciar Sesión</h2>
          
          <div class="alert alert-danger" *ngIf="authenticationError">
            <strong>¡Error!</strong> Usuario o contraseña incorrectos.
          </div>

          <form (ngSubmit)="login()" [formGroup]="loginForm">
            <div class="mb-3">
              <label class="form-label" for="username">Usuario Administrador</label>
              <input type="text" class="form-control" id="username" formControlName="username" placeholder="Ingrese su usuario" #username>
            </div>

            <div class="mb-3">
              <label class="form-label" for="password">Contraseña</label>
              <input type="password" class="form-control" id="password" formControlName="password" placeholder="Ingrese su contraseña">
            </div>

            <div class="mb-3 form-check">
              <input type="checkbox" class="form-check-input" id="rememberMe" formControlName="rememberMe">
              <label class="form-check-label" for="rememberMe">Mantener sesión iniciada</label>
            </div>

            <button type="submit" class="btn btn-primary w-100 btn-lg" [disabled]="loginForm.invalid || isLoadingFetch">
              <span *ngIf="isLoadingFetch" class="spinner-border spinner-border-sm me-2"></span>
              {{ isLoadingFetch ? 'Verificando...' : 'Entrar' }}
            </button>
          </form>
        </div>
      </div>
    </div>

    <div class="col-md-7">
      <jhi-registro-publico></jhi-registro-publico>
    </div>

  </div>
</div>
