<div class="app-container" [class.sidebar-closed]="!sidebarOpen">
  <!-- Overlay para cerrar sidebar en mobile -->
  <div class="sidebar-overlay" id="sidebarOverlay" (click)="toggleSidebar()" [class.show]="!sidebarOpen"></div>

  <!-- Sidebar dinámico -->
  <aside class="sidebar" [class.open]="sidebarOpen">
    <div class="sidebar-header">
      <div class="user-context">
        <div class="avatar">{{ getUserInitials() }}</div>
        <div class="context-text">
          <span class="context-title">{{ currentUser?.login || 'Usuario' | uppercase }}</span>
        </div>
      </div>
    </div>

    <div class="nav-scroll-area">
      <div class="nav-group-label">MENÚ DEL SISTEMA</div>

      <!-- Componente de menú jerárquico -->
      <app-sidebar-menu [menuItems]="menuItems"></app-sidebar-menu>
    </div>

    <!-- Footer del sidebar (opcional) -->
    <!-- 
    <div class="sidebar-footer">
      <a href="#" class="nav-link">
        <i data-lucide="history"></i> Historial
      </a>
      <a href="#" class="nav-link">
        <i data-lucide="life-buoy"></i> Ayuda
      </a>
    </div>
    -->
  </aside>

  <!-- Contenido principal -->
  <div class="main-content">
    <!-- Barra de herramientas superior -->
    <nav class="breadcrumb-bar d-flex justify-content-between align-items-center">
      <div class="d-flex align-items-center">
        <!-- Botón para toggle sidebar en mobile -->
        <button class="mobile-toggle" (click)="toggleSidebar()" id="btnToggle">
          <i data-lucide="menu"></i>
        </button>

        <!-- Breadcrumbs (placeholder) -->
        <i data-lucide="folder" size="14" style="margin-right: 8px"></i>
        <nav aria-label="breadcrumb">
          <ol class="breadcrumb mb-0">
            <li class="breadcrumb-item active">Inicio</li>
          </ol>
        </nav>
      </div>

      <!-- Menú de usuario (dropdown) -->
      <div class="dropdown me-3">
        <div
          class="user-profile-trigger d-flex align-items-center gap-2"
          id="userMenu"
          (click)="toggleUserMenu()"
          style="cursor: pointer"
        >
          <div class="avatar-sm">{{ getUserInitials() }}</div>
          <span class="user-name-text">{{ currentUser?.login || 'Usuario' }}</span>
          <i data-lucide="chevron-down" size="14"></i>
        </div>

        <ul
          class="dropdown-menu dropdown-menu-end shadow border-0 mt-2"
          [class.show]="showUserMenu"
          aria-labelledby="userMenu"
        >
          <li class="px-3 py-2 border-bottom">
            <p class="mb-0 small text-muted">Sesión iniciada como</p>
            <p class="mb-0 fw-bold small text-dark">{{ currentUser?.email || 'Sin email' }}</p>
          </li>
          <li>
            <a class="dropdown-item py-2" href="javascript:void(0);" (click)="goToProfile()">
              <i class="fas fa-user-circle me-2"></i> Mi Perfil
            </a>
          </li>
          <li>
            <a class="dropdown-item py-2 text-danger" href="javascript:void(0);" (click)="logout()">
              <i class="fas fa-sign-out-alt me-2"></i> Cerrar Sesión
            </a>
          </li>
        </ul>
      </div>
    </nav>

    <!-- Contenedor de rutas -->
    <main class="body-container">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>

<!-- Script para inicializar iconos Lucide -->
<script>
  // Lucide icons se inicializarán cuando esté disponible
  if (typeof lucide !== 'undefined') {
    lucide.createIcons();
  }
</script>
