<div class="menu-list">
  @for (menu of menuItems; track menu.id) {
    <div class="menu-group">

      <!-- Encabezado del grupo (clic para expandir) -->
      <button
        class="menu-group-header"
        [class.open]="isOpen(menu.id)"
        (click)="toggleMenu(menu.id)"
        [attr.aria-expanded]="isOpen(menu.id)"
      >
        <fa-icon [icon]="getMenuIcon(menu.titulo)" class="menu-group-icon"></fa-icon>
        <span class="menu-group-title">{{ menu.titulo }}</span>
        @if (menu.submodulos && menu.submodulos.length > 0) {
          <fa-icon
            [icon]="isOpen(menu.id) ? 'chevron-down' : 'chevron-right'"
            class="menu-group-caret"
          ></fa-icon>
        }
      </button>

      <!-- Submódulos (solo los que tiene permiso el usuario, según la API) -->
      @if (menu.submodulos && menu.submodulos.length > 0 && isOpen(menu.id)) {
        <div class="submenu">
          @for (mod of menu.submodulos; track mod.id) {
            <a
              [routerLink]="mod.ruta"
              routerLinkActive="active"
              class="submenu-item"
            >
              <span class="submenu-dot"></span>
              <span class="submenu-text">{{ mod.nombre }}</span>
            </a>
          }
        </div>
      }

    </div>
  }
</div>
