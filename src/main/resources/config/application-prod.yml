# ===================================================================
# Spring Boot configuration — PRODUCCIÓN (Railway + Somee)
# ===================================================================

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:sqlserver://CuatrimestreApp.mssql.somee.com:1433;databaseName=CuatrimestreApp;encrypt=false;trustServerCertificate=true;loginTimeout=60;}
    username: ${SPRING_DATASOURCE_USERNAME:JGRH_SQLLogin_1}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

  jpa:
    database-platform: org.hibernate.dialect.SQLServerDialect
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect

  liquibase:
    enabled: ${SPRING_LIQUIBASE_ENABLED:true}
    contexts: ${SPRING_LIQUIBASE_CONTEXTS:prod}

  web:
    resources:
      static-locations: ${SPRING_WEB_RESOURCES_STATIC_LOCATIONS:classpath:/static/}

server:
  port: ${PORT:8080}

jhipster:
  security:
    authentication:
      jwt:
        base64-secret: ${JHIPSTER_SECURITY_AUTHENTICATION_JWT_BASE64_SECRET:}
        token-validity-in-seconds: 86400
        token-validity-in-seconds-for-remember-me: 2592000
  cors:
    allowed-origins: ${JHIPSTER_CORS_ALLOWED_ORIGINS:}
    allowed-origin-patterns: ${JHIPSTER_CORS_ALLOWED_ORIGIN_PATTERNS:https://*.railway.app}
    allowed-methods: '*'
    allowed-headers: '*'
    exposed-headers: 'Authorization,Link,X-Total-Count,X-cuatrimestreApp-alert,X-cuatrimestreApp-error,X-cuatrimestreApp-params'
    allow-credentials: true
    max-age: 1800
