# ===================================================================
# Spring Boot configuration for the "dev" profile.
#
# This configuration overrides the application.yml file.
# ===================================================================

logging:
  level:
    ROOT: DEBUG
    tech.jhipster: DEBUG
    org.hibernate.SQL: DEBUG
    com.cuatrimestre.app: DEBUG

spring:
  main:
    lazy-initialization: true

  devtools:
    restart:
      enabled: true
      additional-exclude: static/**,.h2.server.properties
    livereload:
      enabled: false

  docker:
    compose:
      enabled: false
      profiles:
        active: dev

  jackson:
    serialization:
      indent-output: true
  
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    url: ${DB_URL:jdbc:sqlserver://CuatrimestreApp.mssql.somee.com;databaseName=CuatrimestreApp;encrypt=false;trustServerCertificate=true;loginTimeout=60;}
    username: ${DB_USERNAME:JGRH_SQLLogin_1}
    password: ${DB_PASSWORD:}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    hikari:
      poolName: Hikari
      auto-commit: false
      connection-timeout: 60000
      maximum-pool-size: 5

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: false

  liquibase:
    enabled: false
    contexts: dev, faker

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  messages:
    cache-duration: PT1S
  thymeleaf:
    cache: false

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: native

jhipster:
  cache:
    ehcache:
      time-to-live-seconds: 3600
      max-entries: 100

  cors:
    allowed-origins: '${CORS_ORIGINS:http://localhost:8100,https://localhost:8100,http://localhost:9000,https://localhost:9000,http://localhost:4200,https://localhost:4200}'
    allowed-origin-patterns: '${CORS_ORIGIN_PATTERNS:https://*.githubpreview.dev}'
    allowed-methods: '*'
    allowed-headers: '*'
    exposed-headers: 'Authorization,Link,X-Total-Count,X-${jhipster.clientApp.name}-alert,X-${jhipster.clientApp.name}-error,X-${jhipster.clientApp.name}-params'
    allow-credentials: true
    max-age: 1800

  security:
    authentication:
      jwt:
        base64-secret: ${JWT_SECRET:}
        token-validity-in-seconds: 86400
        token-validity-in-seconds-for-remember-me: 2592000

  mail:
    base-url: ${APP_BASE_URL:http://127.0.0.1:8080}

  logging:
    use-json-format: false
    logstash:
      enabled: false
      host: localhost
      port: 5000
      ring-buffer-size: 512